output:
  mode: virtual  # virtual | servo | hybrid | ptz

  virtual_camera:
    dead_zone: 0.05
    safe_margin: 0.1
    max_velocity: 1.0
    smoothing_factor: 0.3
    default_zoom: 1.5

  servo:
    pan_min: 0.0
    pan_max: 180.0
    tilt_min: 0.0
    tilt_max: 180.0
    default_pan: 90.0
    default_tilt: 90.0
    max_velocity: 90.0
    max_acceleration: 200.0

  ptz:
    host: "192.168.1.100"
    port: 80
    username: null
    password: null
